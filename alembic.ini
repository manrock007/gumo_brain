# Alembic config (Epic F1) — Postgres-only. SQLite NEVER touches Alembic;
# JobStore runs SCHEMA + MIGRATIONS in-process for the zero-config default.
# The database URL is read from settings.database_url in migrations/env.py, so
# no sqlalchemy.url is hard-coded here.
[alembic]
script_location = migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
